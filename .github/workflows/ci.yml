name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install validation dependency
        run: python3 -m pip install --disable-pip-version-check pyyaml==6.0.3
      - name: Validate shell
        run: bash -n bin/fledge-trust tests/test.sh
      - name: Validate manifests and templates
        run: python3 scripts/validate.py
      - name: Test plugin behavior
        run: bash tests/test.sh

  plugin-windows:
    name: Plugin behavior (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Provide python3 command
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/python-bin"
          python_exe="$(cygpath -u "$pythonLocation")/python.exe"
          printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "$python_exe" > "$RUNNER_TEMP/python-bin/python3"
          chmod +x "$RUNNER_TEMP/python-bin/python3"
          echo "$RUNNER_TEMP/python-bin" >> "$GITHUB_PATH"
      - name: Install validation dependency
        shell: bash
        run: python -m pip install --disable-pip-version-check pyyaml==6.0.3
      - name: Validate and test plugin
        shell: bash
        run: |
          set -euo pipefail
          bash -n bin/fledge-trust tests/test.sh tests/setup-action-fixture.sh
          python -m py_compile scripts/trust_cli.py scripts/validate.py scripts/normalize_specsync_cache.py
          python scripts/validate.py
          bash tests/test.sh

  action-smoke:
    name: Action smoke (${{ matrix.profile }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        profile: [standard, strict]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create two-commit fixture
        run: bash tests/setup-action-fixture.sh "$RUNNER_TEMP/trust-fixture"
      - name: Run local composite Action
        id: trust
        continue-on-error: true
        uses: ./
        with:
          working-directory: ${{ runner.temp }}/trust-fixture
          range: HEAD~1..HEAD
          profile: ${{ matrix.profile }}
      - name: Assert profile behavior
        env:
          PROFILE: ${{ matrix.profile }}
          OUTCOME: ${{ steps.trust.outcome }}
          STATUS: ${{ steps.trust.outputs.status }}
        run: |
          set -euo pipefail
          if [ "$PROFILE" = standard ]; then
            [ "$OUTCOME" = success ]
            [ "$STATUS" = degraded ]
          else
            [ "$OUTCOME" = failure ]
          fi

  action-provenance:
    name: Action provenance (strict pass, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create fixture and remote ledger
        env:
          FIXTURE: ${{ runner.temp }}/trust-provenance
          ORIGIN: ${{ runner.temp }}/trust-origin.git
          PROBE_POLICY: ${{ runner.temp }}/attest-probe.json
        run: |
          set -euo pipefail
          bash tests/setup-action-fixture.sh "$FIXTURE"
          git init --bare -q "$ORIGIN"
          git -C "$FIXTURE" remote add origin "$ORIGIN"
          git -C "$FIXTURE" push -q -u origin HEAD:main
          printf '%s\n' '{"requireAttestation":false}' > "$PROBE_POLICY"
      - name: Install pinned Attest for fixture setup
        id: bootstrap-attest
        uses: CorvidLabs/attest@e8a2d928eb4b9a33185c32ba7b8e9b3a985987f2 # 1.0.0
        with:
          version: "1.0.0"
          range: HEAD~1..HEAD
          policy: ${{ runner.temp }}/attest-probe.json
          working-directory: ${{ runner.temp }}/trust-provenance
      - name: Record and publish valid provenance
        env:
          ATTEST: ${{ steps.bootstrap-attest.outputs.binary }}
          FIXTURE: ${{ runner.temp }}/trust-provenance
        run: |
          set -euo pipefail
          "$ATTEST" sign -C "$FIXTURE" --commit HEAD --reviewer agent:ci --confidence 1 --tests-passed
          git -C "$FIXTURE" push -q origin refs/notes/attest
      - name: Run strict Trust with provenance
        id: trust
        uses: ./
        with:
          working-directory: ${{ runner.temp }}/trust-provenance
          range: HEAD~1..HEAD
          profile: strict
      - name: Assert strict success
        env:
          STATUS: ${{ steps.trust.outputs.status }}
          PROVENANCE: ${{ steps.trust.outputs.provenance-status }}
        run: |
          [ "$STATUS" = passed ]
          [ "$PROVENANCE" = success ]

  action-atlas:
    name: Action Atlas opt-in
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create Atlas fixture
        env:
          FIXTURE: ${{ runner.temp }}/trust-atlas-fixture
        run: |
          set -euo pipefail
          bash tests/setup-action-fixture.sh "$FIXTURE"
          sed -i '/^\[atlas\]/,/^$/ { s/enabled = false/enabled = true/; s/skip_reason = .*/skip_reason = ""/; }' \
            "$FIXTURE/.trust.toml"
          cp templates/atlasignore "$FIXTURE/.atlasignore"
      - name: Resolve enabled Atlas policy through Trust
        id: trust
        uses: ./
        with:
          working-directory: ${{ runner.temp }}/trust-atlas-fixture
          range: HEAD~1..HEAD
      - name: Assert Atlas policy output
        env:
          ATLAS_ENABLED: ${{ steps.trust.outputs['atlas-enabled'] }}
        run: '[ "$ATLAS_ENABLED" = true ]'
      - name: Render Atlas publication
        uses: CorvidLabs/fledge-plugin-atlas@bfae900492615c6263c5ef431d1326eabb8b0406 # v1.3.1
        with:
          path: ${{ runner.temp }}/trust-atlas-fixture
          output-dir: ${{ runner.temp }}/trust-atlas-output
          components: coverage langmix treemap sunburst calendar
          version: bfae900492615c6263c5ef431d1326eabb8b0406
      - name: Render and inspect interactive Atlas
        env:
          FIXTURE: ${{ runner.temp }}/trust-atlas-fixture
          OUTPUT: ${{ runner.temp }}/trust-atlas-output
        run: |
          set -euo pipefail
          fledge-atlas "$FIXTURE" --out "$OUTPUT/index.html"
          test -s "$OUTPUT/index.html"
          test -s "$OUTPUT/atlas.json"
          test -s "$OUTPUT/coverage.svg"

  action-fatal-paths:
    name: Action fatal path (${{ matrix.case }})
    strategy:
      fail-fast: false
      matrix:
        case: [contract-drift, invalid-input, malformed-policy, fetch-failure]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create failing fixture
        env:
          CASE: ${{ matrix.case }}
          FIXTURE: ${{ runner.temp }}/trust-fatal
        run: |
          set -euo pipefail
          bash tests/setup-action-fixture.sh "$FIXTURE"
          case "$CASE" in
            contract-drift) rm "$FIXTURE/specs/example/example.spec.md" ;;
            invalid-input) sed -i 's/schema_version = 1/schema_version = 2/' "$FIXTURE/.trust.toml" ;;
            malformed-policy)
              origin="$RUNNER_TEMP/trust-malformed-origin.git"
              git init --bare -q "$origin"
              git -C "$FIXTURE" remote add origin "$origin"
              git -C "$FIXTURE" push -q -u origin HEAD:main
              git -C "$FIXTURE" notes --ref=attest add -m '{}' HEAD
              git -C "$FIXTURE" push -q origin refs/notes/attest
              printf '%s\n' '{' > "$FIXTURE/.attest.json"
              ;;
            fetch-failure)
              sed -i 's/mode = "soft"/mode = "enforce"/' "$FIXTURE/.trust.toml"
              git -C "$FIXTURE" remote add origin "$RUNNER_TEMP/does-not-exist.git"
              ;;
          esac
      - name: Run Trust fatal path
        id: trust
        continue-on-error: true
        uses: ./
        with:
          working-directory: ${{ runner.temp }}/trust-fatal
          range: HEAD~1..HEAD
      - name: Assert fatal result
        env:
          OUTCOME: ${{ steps.trust.outcome }}
          STATUS: ${{ steps.trust.outputs.status }}
        run: |
          [ "$OUTCOME" = failure ]
          [ "$STATUS" = failed ]
